



<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <style>
      
      p, h2, label {
          color: white;
      }

      .white {
          color: white;
      }

      .wide {
          width: 200px;
      }
      .small {
          width: 100px;
      }
    </style>

    <title>Thunberg Climate Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
	    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
    
    <script>
	window.onload = function() {
		const tempInput = document.getElementById("temp-input");
        const tempView = document.getElementById("temp-view");
        const send = document.getElementById("send-btn");
        const turnoff = document.getElementById("off-btn");
        const killall = document.getElementById("kill-btn");
		        
        tempInput.oninput = function(e) {
        	tempView.textContent = e.target.value;
        };
	};

	</script>
</head>
<body style="background-color:#000000;">
<center>
<br>
<br>
<h2>THUNBERG CLIMATE CONTROL</h2>
<br>
<hr class="white">
<br>
<br>
<form id="settings" method="post">
  <p>Airco:</p>
  <select class="dropdown-menu dropdown-menu-dark position-static d-grid gap-1 p-1 rounded-1 mx-0 border-0" aria-label="airco">
    <option selected value="software">Software</option>
    <option value="hardware">Hardware</option>
    <option value="design">Design</option>
    <option value="canteen">Canteen</option>
    <option value="ceo">CEO</option>
    <option value="conference">Conference</option>
    <option value="flexwork">Flexwork</option>
  	</select>
  	<br><br>
    
  	<label>Temperature: <span id="temp-view">20</span></label>
	<input type="range" class="dropdown-menu dropdown-menu-dark position-static d-grid gap-1 p-1 rounded-1 mx-0 border-0" min="20" max="30" step="1" value="20" id="temp-input">
  	<br>
    
  <p>Mode:</p>
  <select class="dropdown-menu dropdown-menu-dark position-static d-grid gap-1 p-1 rounded-1 mx-0 border-0" aria-label="mode">
    <option selected value="auto">Auto</option>
    <option value="cool">Cool</option>
    <option value="dry">Dry</option>
    <option value="fan">Fan</option>
    <option value="heat">Heat</option>
  </select>
  <br><br>

  <p>Strength:</p>
  <select class="dropdown-menu dropdown-menu-dark position-static d-grid gap-1 p-1 rounded-1 mx-0 border-0" aria-label="strength">
    <option selected value="auto">Auto</option>
    <option value="high">High</option>
    <option value="med">Med</option>
    <option value="low">Low</option>
    <option value="quiet">Quiet</option>
  </select>
  <br><br>

  <p>Toppings:</p>
  <select class="dropdown-menu dropdown-menu-dark position-static d-grid gap-1 p-1 rounded-1 mx-0 border-0" aria-label="toppings">
    <option selected value="normal">Normal</option>
    <option value="powerful">Powerful</option>
    <option value="economy">Economy</option>
  </select>
  <br><br>
  <button type="button" class="btn btn-light small" id="send-btn" value="send">Send</button> <button type="button" class="btn btn-danger small" id="off-btn" value="off">Turn Off</button>
</form> 
<br><br>

<hr class="white">

<br>
 
 <p>Turn off all aircos and make Thunberg happy.</p>
 <button type="button" class="btn btn-danger wide" id="kill-btn">KILL ALL</button>
</center>
</body>
</html>
